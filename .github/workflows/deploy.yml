name: Deploy Node App to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Azure App Settings
        uses: azure/cli@v1
        with:
          inlineScript: |
            az webapp config appsettings set \
              --name VideoRelayServices \
              --resource-group InSignVRS \
              --settings \
                SEO_DESCRIPTION="${{ secrets.SEO_DESCRIPTION }}" \
                SEO_KEYWORD="${{ secrets.SEO_KEYWORD }}" \
                GOOGLE_TAG="${{ secrets.GOOGLE_TAG }}" \
                CLARITY_TAG="${{ secrets.CLARITY_TAG }}" \
                HOME_TITLE="${{ secrets.HOME_TITLE }}" \
                HOME_PARAGRAPH="${{ secrets.HOME_PARAGRAPH }}" \
                BOOK_TITLE="${{ secrets.BOOK_TITLE }}" \
                BOOK_LINK="${{ secrets.BOOK_LINK }}" \
                NODE_ENV=production

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: VideoRelayServices
          package: .