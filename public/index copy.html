<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>InSignLanguage VRS</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar border-bottom box-shadow">
    <a class="navbar-brand" href="/">InSignLanguage VRS</a>
    <div class="nav-pills">
      <a class="nav-link active" href="/">Home</a>
      <a class="nav-link" href="/about">About</a>
      <a class="nav-link" href="/contact">Contact</a>
    </div>
  </nav>

  <!-- Main content -->
  <div id="main-content" class="box-shadow">
    <h1>Welcome to InSignLanguage VRS</h1>
    <p>Environment Variables from Node/Azure:</p>
    <ul id="env-list">
      <li>Message: <span id="message">Loading...</span></li>
      <li>API Key: <span id="apiKey">Loading...</span></li>
      <li>Environment: <span id="environment">Loading...</span></li>
    </ul>
    <button class="btn-primary" onclick="alert('Button Clicked!')">Click Me</button>
  </div>

  <!-- Footer -->
  <footer class="footer border-top">
    &copy; 2026 InSignLanguage VRS. All rights reserved.
  </footer>

  <!-- Fetch environment variables from Node API -->
  <script>
    fetch("/api/message")
      .then(res => res.json())
      .then(data => {
        document.getElementById("message").innerText = data.message;
        document.getElementById("apiKey").innerText = data.apiKey;
        document.getElementById("environment").innerText = data.environment;
      })
      .catch(err => {
        document.getElementById("message").innerText = "Error loading message";
        document.getElementById("apiKey").innerText = "Error loading API Key";
        document.getElementById("environment").innerText = "Error loading environment";
      });
  </script>

</body>
</html>
